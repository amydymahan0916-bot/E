<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کانال‌های ایلیا فارکس</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#050505,#0f0f0f,#000);
overflow:hidden;
}

body::before{
content:"";
position:fixed;
width:350px;
height:350px;
background:#00ff88;
filter:blur(180px);
top:-100px;
right:-100px;
opacity:.2;
}

body::after{
content:"";
position:fixed;
width:350px;
height:350px;
background:#ffd700;
filter:blur(180px);
bottom:-100px;
left:-100px;
opacity:.15;
}

.card{
width:90%;
max-width:420px;
background:rgba(20,20,20,.85);
border:1px solid rgba(255,255,255,.08);
border-radius:25px;
padding:35px 25px;
backdrop-filter:blur(12px);
text-align:center;
box-shadow:0 0 35px rgba(0,255,136,.25);
animation:show .8s ease;
}

@keyframes show{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
color:#fff;
font-size:30px;
margin-bottom:10px;
}

p{
color:#bfbfbf;
margin-bottom:25px;
}

.btn{
display:block;
text-decoration:none;
margin:16px 0;
padding:18px;
border-radius:15px;
font-size:18px;
font-weight:bold;
color:#fff;
background:linear-gradient(135deg,#00b35f,#00ff88);
transition:.3s;
box-shadow:0 0 20px rgba(0,255,136,.25);
}

.btn:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 0 25px #00ff88;
}

.footer{
margin-top:35px;
color:#fff;
font-size:22px;
font-weight:bold;
line-height:1.8;
}

.footer span{
display:block;
font-size:34px;
font-weight:900;
color:#00ff88;
text-shadow:0 0 15px #00ff88;
}
</style>

</head>
<body>

<div class="card">

<h1>📡 کانال‌های ایلیا فارکس</h1>

</div>

</body>

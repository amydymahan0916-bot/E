<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Vazirmatn",sans-serif;
}

:root{

--bg:#070707;
--card:rgba(18,18,18,.82);
--green:#00ff88;
--gold:#ffd700;
--white:#ffffff;
--text:#b8b8b8;

}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

background:#070707;

background-image:

radial-gradient(circle at top right,#00ff8820,transparent 30%),

radial-gradient(circle at bottom left,#ffd70015,transparent 35%),

linear-gradient(180deg,#050505,#111);

overflow-x:hidden;

color:#fff;

}

.container{

width:100%;

max-width:430px;

}

.card{

position:relative;

background:var(--card);

backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.08);

border-radius:32px;

padding:35px 25px;

box-shadow:

0 20px 60px rgba(0,0,0,.45),

0 0 35px rgba(0,255,136,.08);

animation:show .8s ease;

overflow:hidden;

}

.card::before{

content:"";

position:absolute;

width:220px;

height:220px;

background:var(--green);

filter:blur(120px);

opacity:.08;

top:-80px;

right:-80px;

border-radius:50%;

}

.card::after{

content:"";

position:absolute;

width:220px;

height:220px;

background:var(--gold);

filter:blur(120px);

opacity:.06;

bottom:-80px;

left:-80px;

border-radius:50%;

}

@keyframes show{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.profile{

position:relative;

width:135px;

height:135px;

margin:auto;

padding:5px;

border-radius:50%;

background:linear-gradient(135deg,var(--green),var(--gold));

animation:float 4s ease-in-out infinite;

box-shadow:

0 0 25px rgba(0,255,136,.35),

0 0 45px rgba(255,215,0,.18);

z-index:2;

}

.profile img{

width:100%;

height:100%;

object-fit:cover;

border-radius:50%;

border:4px solid #101010;

display:block;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

}

.title{

text-align:center;

font-size:34px;

font-weight:900;

margin-top:22px;

letter-spacing:2px;

}

.subtitle{

text-align:center;

margin-top:10px;

color:var(--text);

font-size:16px;

line-height:1.8;

}

</style>
